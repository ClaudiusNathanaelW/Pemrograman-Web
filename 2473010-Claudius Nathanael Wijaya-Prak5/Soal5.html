<!DOCTYPE html>
<html>
<style>
    ul {
        list-style-type: none;
        margin: 0px;
        padding: 0px;
    }

    li {
        position: relative;
        float: left;
        text-align: center;
        margin-right: 3px;
        width: 100px;
        height: 20px;
        border: dotted;
    }

    li:hover > a {
        background-color: black;
        color: white;
    }

    a {
        display: block;
        width: 100%;
        height: 100%;
        text-decoration: none;
        color: black;
    }


    li ul {
        display: none;
        position: absolute;
        top: 20px;
        left: 0;
    }

    li:hover ul {
        display: block;
    }

    li ul li {
        float: none;
        width: 100px;
        height: 20px;
    }
</style>

<body>

</body>
<ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">News</a>
        <ul>
            <li><a href="#">Sports</a></li>
            <li><a href="#">Music</a></li>
            <li><a href="#">Movie</a></li>
        </ul>
    </li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">About</a></li>
</ul>

</html>
