<!DOCTYPE html>
<html>

<head>
    <script>
        function proses() {
            let input = document.getElementById("input").value;
            let mode = document.getElementById("mode").value;
            let output = "";

            if (mode === "dec-bin") {
                if (isNaN(input) || input < 0 || input > 255) {
                    alert("Input harus angka 0 - 255");
                    return;
                }

                let num = parseInt(input);

                while (num > 0) {
                    output = (num % 2) + output;
                    num = Math.floor(num / 2);
                }

                if (output === "") output = "0";

                while (output.length < 8) {
                    output = "0" + output;
                }
            }

            else {
                if (!/^[01]{1,8}$/.test(input)) {
                    alert("Input harus biner (0/1) maksimal 8 digit");
                    return;
                }

                let panjang = input.length;

                for (let i = 0; i < panjang; i++) {
                    let bit = input[panjang - 1 - i]; // dari belakang
                    output += 0; // dummy supaya tidak undefined
                }

                // reset output jadi angka
                output = 0;

                for (let i = 0; i < panjang; i++) {
                    let bit = parseInt(input[panjang - 1 - i]);
                    output += bit * Math.pow(2, i);
                }
            }

            document.getElementById("output").value = output;
        }

        function resetForm() {
            document.getElementById("input").value = "";
            document.getElementById("output").value = "";
        }
    </script>


    <style>
        table {
            border: 1px solid black;
            padding: 10px;
        }

        td {
            padding: 5px;
            border: 1px solid black;
            color: blue;
        }
        button{
            color: blue;
        }
        input,
        select {
            width: 180px;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <td><b>Input:</b></td>
            <td><input type="text" id="input"></td>
        </tr>
        <tr>
            <td><b>Output:</b></td>
            <td><input type="text" id="output" readonly></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <select id="mode">
                    <option value="dec-bin">decimal-biner</option>
                    <option value="bin-dec">biner-decimal</option>
                </select>
            </td>
        </tr>
        <tr>
            <td colspan="2" align="center"><button onclick="proses()">PROSES</button> <button onclick="resetForm()">RESET</button></td>
        </tr>
    </table>

</body>

</html>
