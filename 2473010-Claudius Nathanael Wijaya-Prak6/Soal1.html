<!DOCTYPE html>
<html>

<script>
    function count() {
        let a1 = document.getElementById("angka1").value;
        let a2 = document.getElementById("angka2").value;

        if (isNaN(a1) && isNaN(a2)) {
            alert("angka pertama dan kedua harus angka");
            return;
        } else if (isNaN(a1)) {
            alert("angka pertama bukan angka");
            return;
        } else if (isNaN(a2)) {
            alert("angka kedua harus angka");
            return;
        }

        a1 = parseInt(a1);
        a2 = parseInt(a2);

        let tambah = a1 + a2;
        let kurang = a1 - a2;

        document.getElementById("t1").innerHTML = a1;
        document.getElementById("t2").innerHTML = a2;
        document.getElementById("t3").innerHTML = tambah;

        document.getElementById("k1").innerHTML = a1;
        document.getElementById("k2").innerHTML = a2;
        document.getElementById("k3").innerHTML = kurang;
    }
</script>

    p {
        display: inline;
    }

    td {

</head>

</html>
