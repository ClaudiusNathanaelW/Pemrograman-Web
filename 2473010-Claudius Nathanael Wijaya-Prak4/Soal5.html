<!DOCTYPE html>
<html>
<style>
    .level1 {
        list-style-image: url('img/sqpurple.gif');
    }

    .level2 {
        list-style-image: url('img/sqorange.gif');
    }

    .level3 {
        list-style-image: none;
    }

    .no-bullet {
        list-style-type: none;
    }

    ul {
        margin-left: 20px;
    }
</style>

<body>
    <ul class="level1">
        <li>Coffee</li>
        <li>Tea
            <ul class="level2">
                <li><span style="color: orange;">Cold</span> Tea
                    <ul class="level3">
                        <li class="no-bullet"><u>Jasmine</u></li>
                        <li class="no-bullet"><u>Green</u></li>
                    </ul>
                </li>
                <li><span style="color: orange;">Hot</span> Tea</li>
            </ul>
        </li>
        <li>Coca Cola</li>
    </ul>

</body>

</html>
